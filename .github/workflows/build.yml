name: Build Dynamic EQ

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-windows:
    name: Build Windows VST3
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure CMake
        run: cmake -B build -G "Visual Studio 17 2022" -A x64

      - name: Build
        run: cmake --build build --config Release

      - name: Upload VST3
        uses: actions/upload-artifact@v4
        with:
          name: DynamicEQ-Windows-VST3
          path: build/DynamicEQ_artefacts/Release/VST3/
          retention-days: 30

  build-mac:
    name: Build Mac VST3 + AU
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install CMake
        run: brew install cmake

      - name: Configure CMake
        run: cmake -B build -G Xcode

      - name: Build
        run: cmake --build build --config Release

      - name: Upload VST3
        uses: actions/upload-artifact@v4
        with:
          name: DynamicEQ-Mac-VST3
          path: build/DynamicEQ_artefacts/Release/VST3/
          retention-days: 30

      - name: Upload AU
        uses: actions/upload-artifact@v4
        with:
          name: DynamicEQ-Mac-AU
          path: build/DynamicEQ_artefacts/Release/AU/
          retention-days: 30